server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # 反向代理：/proxy/* 转发到后端 gateway 容器
    #  使用变量方式，避免 nginx 启动时找不到 gateway 主机而报错
    #  同 Docker Compose 网络时 gateway 可达；单独运行时请求失败但 nginx 正常启动
    location /proxy/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://gateway:3000;
        rewrite ^/proxy/(.*) /$1 break;   # 加这行：把 /proxy/auth/login → /auth/login
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA history 路由：未匹配路径返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}